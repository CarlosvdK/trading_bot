# config/example.yaml — Full configuration template
# Skill reference: .claude/skills/index/SKILL.md

system:
  mode: paper               # paper | live
  environment: dev           # dev | staging | prod
  log_level: INFO

data:
  data_dir: "data/ohlcv"
  universe_file: "data/universe.csv"
  corporate_actions_file: "data/corporate_actions.csv"
  max_ffill_days: 1
  max_missing_pct: 0.05
  max_staleness_days: 3
  validate_on_load: true
  timezone: "America/New_York"

portfolio:
  initial_nav: 100000
  benchmark_symbol: "SPY"
  sleeve_allocations:
    core: 0.60
    swing: 0.30
    cash_buffer: 0.10

risk:
  max_portfolio_drawdown: 0.15
  max_daily_loss_pct: 0.03
  kill_switch_cooldown_days: 5
  manual_restart_required: true
  swing:
    max_weekly_loss: 0.05
    max_concurrent_positions: 10
    max_position_pct: 0.15
    max_sector_pct: 0.30
    per_trade_stop_multiplier: 2.0
  exposure:
    max_gross_exposure_pct: 1.0
    max_cross_sleeve_corr: 0.70
  pdt:
    enforce: true
    account_threshold: 25000
    max_day_trades_rolling_5d: 3
  core:
    rebalance_band: 0.05
    min_adv_usd: 1000000

cost_model:
  commission_bps: 0.5
  regulatory_fee_bps: 0.3
  spread_cost_bps: 1.0
  market_impact_factor: 0.1
  borrow_cost_bps_annual: 100
  participation_rate: 0.05
  settlement_lag_days: 2

labeling:
  k1: 1.0
  k2: 1.0
  horizon_days: 15
  vol_window: 21
  embargo_days: 12
  binary_labels: true

walk_forward:
  initial_train_days: 756
  test_days: 126
  step_days: 63
  embargo_days: 12
  expanding: true
  min_train_samples: 100
  horizon_days: 10

features:
  return_windows: [5, 10, 21]
  vol_windows: [5, 21]
  volume_surprise_window: 21
  momentum_consistency_window: 10
  vvol_window: 21
  index_symbol: "SPY"
  winsorize_sigma: 3.0
  rolling_norm_window: 252
  min_history_days: 63

ml:
  entry_threshold: 0.20
  calibration_method: "isotonic"
  min_cal_samples: 300
  drift_alert_psi: 0.20
  drift_retrain_psi: 0.25
  min_oos_auc_to_deploy: 0.55
  max_days_between_trains: 90
  lookback_days: 90
  min_samples_for_eval: 30

swing_signals:
  momentum_signal_enabled: true
  momentum_lookback_days: 5
  momentum_threshold_pct: 0.03
  volume_surge_min: 1.2
  vol_expansion_signal_enabled: true
  vol_expansion_ratio: 1.5
  vol_short_window: 5
  vol_long_window: 21
  risk_on_gate:
    enabled: true
    min_index_ret_5d: -0.01
    max_vol_ratio: 1.5

sizing:
  holding_days: 15
  target_position_vol_pct: 0.005
  max_position_pct_swing: 0.15
  min_position_usd: 500
  ml_entry_threshold: 0.20
  ml_max_size_scale: 1.5
  ml_min_size_scale: 0.5
  vol_proxy_window: 21
  barriers:
    k1: 1.0
    k2: 1.0

regime_detection:
  method: "hmm"
  n_regimes: 4
  initial_train_days: 504
  step_days: 63
  min_persistence_days: 3
  index_symbol: "SPY"

execution:
  mode: paper
  max_orders_per_minute: 20
  max_notional_per_minute: 500000
  order_routing:
    default_session: regular
    regular_hours: "09:30-16:00"
    timezone: "America/New_York"
